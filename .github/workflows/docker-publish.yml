# ============================================================================
# Magicmail Docker 镜像 CI/CD
# 多架构构建 (linux/amd64 + linux/arm64) 并同步推送至 Docker Hub + GitHub Container Registry
# 触发条件: 推送 tag (v*) 或手动触发
# ============================================================================

name: Docker Image CI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      push_image:
        description: '是否推送到镜像仓库'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      image_tag:
        description: '镜像标签 (留空则使用 commit SHA)'
        required: false
        default: ''

env:
  # Docker Hub
  REGISTRY_HUB: docker.io
  IMAGE_NAME_HUB: ${{ github.repository }}
  # GitHub Container Registry (ghcr.io)
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME_GHCR: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Multi-Arch
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ─── 1. 检出代码 ──────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. 配置 QEMU (支持多架构) ────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ─── 3. 配置 Buildx ──────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ─── 4a. 登录 Docker Hub ─────────────────────
      - name: Log in to Docker Hub
        if: github.event_name == 'push' || inputs.push_image == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HUB }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ─── 4b. 登录 GitHub Container Registry ──────
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' || inputs.push_image == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ─── 5. 提取元数据 (双仓库标签) ──────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY_HUB }}/${{ env.IMAGE_NAME_HUB }}
            ${{ env.REGISTRY_GHCR }}/${{ env.IMAGE_NAME_GHCR }}
          tags: |
            # tag 推送: v1.2.3 → 1.2.3, 1.2, 1, latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
            # 手动触发: 使用自定义标签或 SHA
            type=raw,value=${{ inputs.image_tag }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.image_tag != '' }}
            type=sha,prefix=,enable=${{ github.event_name == 'workflow_dispatch' && inputs.image_tag == '' }}

      # ─── 6. 构建并推送 (双仓库同步) ─────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' || inputs.push_image == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
